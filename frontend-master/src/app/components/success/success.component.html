<div class="container success-page py-5">
  <div class="card success-card p-4 p-md-5 text-center mx-auto">
    <div class="success-icon mb-3">✅</div>
    <h3 class="mb-2">Order Placed Successfully</h3>
    <p class="text-muted mb-4">Thanks for ordering from PizzaHub. We are preparing your pizzas.</p>

    <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
      <button class="btn btn-danger px-4" type="button" (click)="goToOrders()">View Orders</button>
      <button class="btn btn-outline-dark px-4" type="button" (click)="goToProducts()">Order More</button>
    </div>
  </div>
</div>
