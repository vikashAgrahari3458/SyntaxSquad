<app-navbar></app-navbar>
<div class="container menu-page py-4 py-md-5">
	<div class="menu-header mb-4 mb-md-5">
		<h2 class="mb-1">PizzaHub Menu</h2>
		<p class="text-muted mb-0">Fresh pizzas and chilled drinks, delivered fast.</p>
	</div>

	<div class="menu-controls card border-0 p-3 p-md-4 mb-4">
		<div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
			<div class="btn-group category-group" role="group" aria-label="Category Filters">
				<button
					*ngFor="let category of categories"
					type="button"
					class="btn"
					[ngClass]="selectedCategory === category ? 'btn-danger' : 'btn-outline-danger'"
					(click)="setCategory(category)"
				>
					{{ category }}
				</button>
			</div>

			<div class="d-flex flex-column flex-sm-row align-items-sm-center gap-2 w-100 w-lg-auto">
				<div class="search-wrap position-relative">
					<i class="bi bi-search search-icon"></i>
					<input
						type="text"
						class="form-control search-input"
						placeholder="Search pizza or drinks"
						[(ngModel)]="searchText"
					/>
				</div>

				<a routerLink="/cart" class="btn btn-dark cart-pill">
					<i class="bi bi-cart3 me-1"></i>
					Cart
					<span class="badge bg-light text-dark ms-2">{{ cartCount }}</span>
				</a>
			</div>
		</div>
	</div>

	<div class="row g-3 g-md-4">
		<div class="col-12 col-sm-6 col-lg-4" *ngFor="let item of filteredItems; let idx = index">
			<div class="card menu-card border-0 h-100" [class.offset-card]="idx % 2 === 1">
				<div class="image-wrap position-relative">
					<img [src]="item.image" class="card-img-top" [alt]="item.name" loading="lazy" (error)="onImageError($event)" />
					<div class="tag-strip d-flex gap-2">
						<span class="menu-tag veg-tag" *ngIf="item.isVeg">Veg</span>
						<span class="menu-tag bestseller-tag" *ngIf="item.isBestseller">🔥 Bestseller</span>
					</div>
				</div>

				<div class="card-body d-flex flex-column">
					<div class="d-flex justify-content-between align-items-start mb-2">
						<h5 class="card-title mb-0">{{ item.name }}</h5>
						<span class="price">₹{{ item.price }}</span>
					</div>

					<div class="meta-line mb-3">
						<span><i class="bi bi-star-fill text-warning me-1"></i>{{ item.rating }}</span>
						<span class="dot">•</span>
						<span><i class="bi bi-clock me-1"></i>{{ item.deliveryTime }}</span>
					</div>

					<button class="btn btn-danger mt-auto" type="button" (click)="addToCart(item)">
						Add to Cart
					</button>
				</div>
			</div>
		</div>
	</div>

	<div class="text-center py-5" *ngIf="filteredItems.length === 0">
		<h5 class="mb-2">No matching items found</h5>
		<p class="text-muted mb-0">Try changing the category or search text.</p>
	</div>
</div>
