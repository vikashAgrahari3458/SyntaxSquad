
<app-navbar></app-navbar>


<div class="container mt-4">

  <h2 class="mb-4">🛒 Your Cart</h2>

  <div class="row">

    <!-- LEFT: Items -->
    <div class="col-md-8">

      <div *ngIf="cartItems.length === 0" class="text-center p-5">
        <h4>Your cart is empty 🍕</h4>
      </div>

      <div *ngFor="let item of cartItems" class="card mb-3 p-3 shadow-sm rounded-3 d-flex flex-row align-items-center justify-content-between">

        <!-- Image -->
        <img [src]="item.image" width="100" style="border-radius:10px;" />

        <!-- Item Details -->
        <div class="flex-grow-1 ms-3">
          <h5 class="mb-1">{{ item.name || 'Pizza Item' }}</h5>
          <div class="text-muted small">₹{{ item.price }} each</div>
          <div class="fw-semibold mt-1">Item Total: ₹{{ item.price * item.quantity }}</div>
        </div>

       

        <!-- Quantity -->
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-outline-secondary btn-sm" (click)="decrease(item)">-</button>
          <span>{{ item.quantity }}</span>
          <button class="btn btn-outline-secondary btn-sm" (click)="increase(item)">+</button>
        </div>

        <!-- Remove -->
        <button class="btn btn-danger btn-sm ms-3" (click)="remove(item)">
          Remove
        </button>

      </div>
    </div>

    <!-- RIGHT: Summary -->
    <div class="col-md-4">

      <div class="card p-4 shadow-sm rounded-3">

        <h4>Order Summary</h4>

        <p>Subtotal: ₹{{ getTotal() }}</p>
        <p>Discount: ₹0</p>

        <hr />

        <h5>Total: ₹{{ getTotal() }}</h5>

        <button class="btn btn-success w-100 mt-3" (click)="goToPayment()">
          Proceed to Payment
        </button>

      </div>

    </div>

  </div>

</div>
