<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light py-5">
  <div class="row w-100">
    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-success text-white">
      <div class="text-center">
        <h1 class="display-4">Join Us Today!</h1>
        <p class="lead">Create your account and start shopping with us.</p>
        <img src="https://via.placeholder.com/400x300?text=Register+Image" alt="Register Image" class="img-fluid rounded">
      </div>
    </div>
    <div class="col-md-6 d-flex align-items-center justify-content-center">
      <div class="card shadow-lg p-4 w-100" style="max-width: 400px;">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Register</h2>
          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" formControlName="name" placeholder="Enter your full name">
              <div *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="text-danger">
                Name must be at least 2 characters.
              </div>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" formControlName="email" placeholder="Enter your email">
              <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-danger">
                Please enter a valid email.
              </div>
            </div>
            <div class="mb-3">
              <label for="phone" class="form-label">Phone Number</label>
              <input type="tel" class="form-control" id="phone" formControlName="phone" placeholder="Enter your phone number">
              <div *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched" class="text-danger">
                Please enter a valid phone number.
              </div>
            </div>
            <div class="mb-3">
              <label for="address" class="form-label">Address</label>
              <textarea class="form-control" id="address" formControlName="address" rows="3" placeholder="Enter your address"></textarea>
              <div *ngIf="registerForm.get('address')?.invalid && registerForm.get('address')?.touched" class="text-danger">
                Address must be at least 10 characters.
              </div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" formControlName="password" placeholder="Enter your password">
              <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="text-danger">
                Password must be at least 6 characters.
              </div>
            </div>
            <button type="submit" class="btn btn-success w-100" [disabled]="registerForm.invalid">Sign Up</button>
          </form>
          <div class="text-center mt-3">
            <p>Already have an account? <a href="/" class="text-decoration-none">Sign in</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
